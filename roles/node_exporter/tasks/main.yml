---
- name: Create node_exporter user
  user:
    name: node_exporter
    shell: /sbin/nologin
    system: yes

- name: Download node_exporter
  get_url:
    url: https://github.com/prometheus/node_exporter/releases/download/v1.12.1/node_exporter-1.12.1.linux-amd64.tar.gz
    dest: /tmp/node_exporter.tar.gz

- name: Create extraction directory
  file:
    path: /tmp/node_exporter_extracted
    state: directory

- name: Extract node_exporter using tar command directly
  command: tar xzf /tmp/node_exporter.tar.gz -C /tmp/node_exporter_extracted --strip-components=1
  args:
    creates: /tmp/node_exporter_extracted/node_exporter

- name: Copy binary to /usr/local/bin
  copy:
    src: /tmp/node_exporter_extracted/node_exporter
    dest: /usr/local/bin/node_exporter
    mode: '0755'
    remote_src: yes

- name: Set ownership
  file:
    path: /usr/local/bin/node_exporter
    owner: node_exporter
    group: node_exporter
    mode: '0755'

- name: Create systemd service file
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
  notify: Restart node_exporter

- name: Open firewall for node_exporter port
  ansible.posix.firewalld:
    port: 9100/tcp
    permanent: yes
    state: enabled
    immediate: yes

- name: Start and enable node_exporter
  systemd:
    name: node_exporter
    state: started
    enabled: yes
    daemon_reload: yes
